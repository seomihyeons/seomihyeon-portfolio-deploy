<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting...</title>
  <script>
    (function () {
      var pathSegmentsToKeep = 1;
      var l = window.location;
      var basePath = l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/");
      var routePath = l.pathname
        .slice(1)
        .split("/")
        .slice(pathSegmentsToKeep)
        .join("/")
        .replace(/&/g, "~and~");
      var query = l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "";
      var redirectUrl =
        l.protocol +
        "//" +
        l.hostname +
        (l.port ? ":" + l.port : "") +
        basePath +
        "/?/" +
        routePath +
        query +
        l.hash;
      l.replace(redirectUrl);
    })();
  </script>
</head>
<body></body>
</html>
